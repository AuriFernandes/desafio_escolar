<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Escolar Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* === ESTILOS BASE === */
        :root { --primary: #4f46e5; --secondary: #10b981; --bg: #f9fafb; --text: #111827; --wrong: #ef4444; --alert: #f59e0b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 15px; }
        .app-container { width: 100%; max-width: 550px; background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* === TELAS === */
        .screen { display: none; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* === COMPONENTES UI === */
        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; font-weight: 900; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 5px; color: #4b5563; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-danger { background: var(--wrong); }
        
        /* === QUESTÕES === */
        .hud { display: flex; justify-content: space-between; font-weight: 800; color: #6b7280; font-size: 0.9rem; margin-bottom: 15px; }
        .option { background: #fff; border: 2px solid #e5e7eb; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; font-weight: 700; text-align: left; transition: 0.2s; }
        .option.selected { border-color: var(--primary); background: #eef2ff; }
        .option.correct { border-color: var(--secondary); background: #ecfdf5; color: #065f46; }
        .option.wrong { border-color: var(--wrong); background: #fef2f2; color: #991b1b; }
        .option.disabled { pointer-events: none; opacity: 0.8; }
        
        /* === EXTRAS === */
        .chapter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; background: #f3f4f6; padding: 15px; border-radius: 12px; }
        .cap-item { font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-weight: 700; cursor: pointer; }
        .feedback { display: none; padding: 15px; background: #f3f4f6; border-radius: 10px; margin: 15px 0; border-left: 5px solid var(--primary); font-size: 0.9rem; }
        .chances-alert { color: var(--alert); font-weight: 900; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="screen-loading" class="screen active">
        <h1>📡 Conectando...</h1>
        <p style="text-align: center; color: #6b7280;">Buscando dados da planilha...</p>
    </div>

    <div id="screen-register" class="screen">
        <h1 id="ui-title">Desafio</h1>
        <div class="form-group"><label>Nome:</label><input type="text" id="reg-nome"></div>
        <div class="form-group"><label>Sobrenome:</label><input type="text" id="reg-sobre"></div>
        <div class="form-group"><label>Série/Turma:</label><input type="text" id="reg-turma"></div>
        <div class="form-group">
            <label>Turno:</label>
            <select id="reg-turno"><option value="Manhã">Manhã</option><option value="Tarde">Tarde</option><option value="Noite">Noite</option></select>
        </div>
        
        <div id="area-capitulos" style="display:none;">
            <label>Capítulos para estudar:</label>
            <div id="lista-capitulos" class="chapter-grid"></div>
        </div>

        <div class="form-group">
            <label>Modo de Avaliação:</label>
            <select id="game-mode">
                <option value="Maratona">🏃‍♂️ Maratona (Avaliativo)</option>
                <option value="Sobrevivencia">⭐ Sobrevivência (Treino)</option>
                <option value="Revisao">🔄 Revisão Livre</option>
            </select>
        </div>

        <div class="form-group" id="area-chances" style="display:none; background: #fffbeb; padding: 10px; border-radius: 8px; border: 1px solid #fde68a;">
            <label style="color: #d97706;">Nível do Treino:</label>
            <select id="sel-chances">
                <option value="3">⭐ 3 Tentativas (Difícil)</option>
                <option value="4" selected>⭐ 4 Tentativas (Médio)</option>
                <option value="5">⭐ 5 Tentativas (Fácil)</option>
            </select>
        </div>

        <button onclick="iniciar()">Iniciar Desafio</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="hud"><span id="hud-left"></span><span id="hud-right"></span></div>
        <div id="question-text" style="font-weight:800; margin-bottom:20px; font-size:1.1rem; text-align:left;"></div>
        <div id="options-container"></div>
        <div id="feedback" class="feedback"></div>
        <button id="btn-next" style="display:none;" onclick="proxima()">Avançar</button>
    </div>

    <div id="screen-final" class="screen">
        <h1 id="final-status">Desafio Concluído!</h1>
        <div id="resumo-final" style="margin: 20px 0; font-weight: 700; line-height: 1.6; background: #f3f4f6; padding: 15px; border-radius: 12px;"></div>
        <p id="msg-envio" style="display:none; color: var(--secondary); font-weight: 800; text-align: center; margin-bottom: 15px;">✅ Dados enviados ao professor.</p>
        <button onclick="location.reload()">Novo Jogo</button>
    </div>
</div>

<script>
    // === 1. VARIÁVEIS GLOBAIS DE ESTADO ===
    const urlParams = new URLSearchParams(window.location.search);
    const SPREADSHEET_ID = urlParams.get('id') || '1loxsFbL29guiBUY16GyL7bq9WiL3RyBeMKVnDBC2LKs';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbynRPe6BcA7KnwEuFYCDnQbXkHMCmB8nYNOQ-YLJZNUe9sOYe9D8lsksAsgrZAE_6TT/exec';

    let CONFIG = { banco: [], ativos: "", escolha: "Não" };
    let aluno = {};
    let jogo = { banco: [], atual: 0, acertos: 0, erros: 0, idsErrados: [], inicio: 0, caps: "", maxChances: 0, chancesRestantes: 0 };

    // === LÓGICA DE INTERFACE: Exibir seletor de chances ===
    document.getElementById('game-mode').addEventListener('change', function() {
        document.getElementById('area-chances').style.display = this.value === 'Sobrevivencia' ? 'block' : 'none';
    });

    // === 2. FUNÇÃO DE LEITURA DO GOOGLE ===
    async function fetchSheet(nomeAba) {
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${nomeAba}`;
        const response = await fetch(url);
        const text = await response.text();
        const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
        return JSON.parse(jsonStr);
    }

    // === 3. INICIALIZAÇÃO ===
    async function load() {
        try {
            const dataC = await fetchSheet("Configuracao");
            if (dataC.table && dataC.table.rows) {
                dataC.table.rows.forEach(r => { 
                    if(!r.c || !r.c[0]) return;
                    const chave = r.c[0].v;
                    const valor = r.c[1] ? r.c[1].v : "";
                    if(chave === 'capitulosAtivos') CONFIG.ativos = String(valor);
                    if(chave === 'escolhaPeloAluno') CONFIG.escolha = String(valor);
                });
            }

            const dataQ = await fetchSheet("Questoes");
            if (dataQ.table && dataQ.table.rows) {
                dataQ.table.rows.forEach(r => {
                    if(!r.c || !r.c[0] || !r.c[1]) return; 
                    CONFIG.banco.push({ 
                        id: r.c[0].v, 
                        txt: r.c[1].v, 
                        opts: [r.c[2]?.v, r.c[3]?.v, r.c[4]?.v, r.c[5]?.v].filter(Boolean),
                        correta: r.c[6]?.v, 
                        exp: r.c[7]?.v, 
                        cap: r.c[9]?.v 
                    });
                });
            }

            if(CONFIG.escolha === "Sim") {
                document.getElementById('area-capitulos').style.display = 'block';
                const caps = [...new Set(CONFIG.banco.map(q => q.cap))].filter(Boolean).sort((a,b) => Number(a) - Number(b));
                const lista = document.getElementById('lista-capitulos');
                caps.forEach(c => {
                    lista.innerHTML += `<label class="cap-item"><input type="checkbox" class="cap-check" value="${c}" checked> Capítulo ${c}</label>`;
                });
            }

            show('screen-register');
        } catch(e) { 
            console.error("Erro no carregamento:", e);
            document.getElementById('screen-loading').innerHTML = `
                <h1 style="color:var(--wrong)">Erro ❌</h1>
                <p style="text-align:center">A planilha não foi encontrada ou não está pública.</p>`;
        }
    }

    // === 4. LÓGICA DO JOGO ===
    function iniciar() {
        aluno = { 
            nome: document.getElementById('reg-nome').value.trim(), 
            sobre: document.getElementById('reg-sobre').value.trim(), 
            turma: document.getElementById('reg-turma').value.trim(), 
            turno: document.getElementById('reg-turno').value 
        };
        
        if(!aluno.nome || !aluno.turma) return alert("Por favor, preencha seu Nome e Turma!");

        let alvos = [];
        if(CONFIG.escolha === "Sim") {
            document.querySelectorAll('.cap-check:checked').forEach(i => alvos.push(Number(i.value)));
            if(alvos.length === 0) return alert("Selecione pelo menos um capítulo!");
        } else {
            alvos = CONFIG.ativos.split(',').map(Number);
        }

        jogo.modo = document.getElementById('game-mode').value;
        
        // Configura chances se for Sobrevivência
        if(jogo.modo === 'Sobrevivencia') {
            jogo.maxChances = parseInt(document.getElementById('sel-chances').value);
            jogo.chancesRestantes = jogo.maxChances;
        }

        jogo.caps = alvos.join(", ");
        jogo.banco = CONFIG.banco.filter(q => alvos.includes(Number(q.cap))).sort(() => Math.random() - 0.5);
        
        if(jogo.banco.length === 0) return alert("Nenhuma questão encontrada para os capítulos selecionados.");
        
        jogo.inicio = Date.now();
        show('screen-quiz'); 
        render();
    }

    function render() {
        const q = jogo.banco[jogo.atual];
        document.getElementById('hud-left').innerText = `Questão ${jogo.atual + 1} de ${jogo.banco.length}`;
        
        // Renderização específica de HUD para Sobrevivência
        if (jogo.modo === 'Sobrevivencia') {
            document.getElementById('hud-right').innerHTML = `<span class="chances-alert">⭐ ${jogo.chancesRestantes} Tentativas</span>`;
        } else {
            document.getElementById('hud-right').innerText = `Modo: ${jogo.modo}`;
        }
        
        document.getElementById('question-text').innerText = q.txt;
        const cont = document.getElementById('options-container'); 
        cont.innerHTML = '';
        
        q.opts.forEach((optText, index) => { 
            const d = document.createElement('div'); 
            d.className = 'option'; 
            d.innerText = optText;
            d.onclick = () => validar(index + 1, d, q); 
            cont.appendChild(d);
        });
        
        document.getElementById('feedback').style.display = 'none';
        
        const btn = document.getElementById('btn-next');
        btn.style.display = 'none';
        btn.innerText = "Avançar";
        btn.className = "";
        btn.onclick = proxima;
    }

    function validar(escolha, divOpcao, q) {
        if(document.querySelector('.option.disabled')) return; 
        document.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));
        
        const respostaReal = parseInt(q.correta) - q.txt.length - parseInt(q.id);
        const acertou = (escolha === respostaReal);

        if(jogo.modo === 'Maratona') {
            divOpcao.classList.add('selected'); 
            if(acertou) jogo.acertos++; else { jogo.erros++; jogo.idsErrados.push(q.id); }
            document.getElementById('btn-next').style.display = 'block';
            
        } else if (jogo.modo === 'Sobrevivencia') {
            if(acertou) { 
                divOpcao.classList.add('correct'); 
                jogo.acertos++; 
                document.getElementById('btn-next').style.display = 'block';
            } else { 
                divOpcao.classList.add('wrong'); 
                jogo.erros++; 
                jogo.chancesRestantes--;
                
                document.getElementById('hud-right').innerHTML = `<span class="chances-alert">⭐ ${jogo.chancesRestantes} Tentativas</span>`;
                
                if(q.exp) {
                    document.getElementById('feedback').innerText = "📖 " + q.exp; 
                    document.getElementById('feedback').style.display = 'block'; 
                }

                // GAME OVER STATE
                if(jogo.chancesRestantes <= 0) {
                    const btn = document.getElementById('btn-next');
                    btn.innerText = "Fim de Jogo - Ver Resultado";
                    btn.className = "btn-danger";
                    btn.onclick = () => finalizar(true); // Aciona o final prematuro
                    btn.style.display = 'block';
                } else {
                    document.getElementById('btn-next').style.display = 'block';
                }
            }
        } else {
            // Modo Revisão
            if(acertou) { divOpcao.classList.add('correct'); jogo.acertos++; }
            else { 
                divOpcao.classList.add('wrong'); jogo.erros++; 
                if(q.exp) {
                    document.getElementById('feedback').innerText = "📖 " + q.exp; 
                    document.getElementById('feedback').style.display = 'block'; 
                }
            }
            document.getElementById('btn-next').style.display = 'block';
        }
    }

    function proxima() {
        jogo.atual++;
        if(jogo.atual < jogo.banco.length) render(); else finalizar(false);
    }

    function finalizar(isGameOver = false) {
        show('screen-final');
        const tempoSegundos = Math.floor((Date.now() - jogo.inicio) / 1000);
        const minutos = Math.floor(tempoSegundos / 60);
        const tempoFormatado = minutos > 0 ? `${minutos}m ${tempoSegundos % 60}s` : `${tempoSegundos}s`;

        if (isGameOver) {
            document.getElementById('final-status').innerText = "Game Over!";
            document.getElementById('final-status').style.color = "var(--wrong)";
        } else {
            document.getElementById('final-status').innerText = "Desafio Concluído!";
            document.getElementById('final-status').style.color = "var(--primary)";
        }

        let htmlResumo = `
            <div>🎯 <b>Acertos:</b> ${jogo.acertos}</div>
            <div>❌ <b>Erros:</b> ${jogo.erros}</div>
            <div>⏱️ <b>Tempo:</b> ${tempoFormatado}</div>
            <div style="margin-top:10px; font-size:0.9rem; color:#4b5563;">📚 Capítulos: ${jogo.caps}</div>
        `;
        
        if (jogo.modo === 'Sobrevivencia') {
            htmlResumo += `<div style="margin-top:10px; color:var(--alert);">⭐ Questões respondidas: ${jogo.atual + (isGameOver ? 1 : 0)} de ${jogo.banco.length}</div>`;
        }

        document.getElementById('resumo-final').innerHTML = htmlResumo;
        
        // ENVIO GARANTIDO: Apenas se for Maratona E chegar no finalizar(). Game Over não envia.
        if(jogo.modo === 'Maratona' && !isGameOver) {
            document.getElementById('msg-envio').style.display = 'block';
            const payload = { 
                nome: aluno.nome, sobrenome: aluno.sobre, turma: aluno.turma, turno: aluno.turno, 
                capitulos: jogo.caps, acertos: jogo.acertos, erros: jogo.erros, 
                idsErrados: jogo.idsErrados, tempo: tempoSegundos 
            };
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        }
    }

    function show(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }
    
    load();
</script>
</body>
</html>
